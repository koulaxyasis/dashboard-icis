<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Project Manager — Customizable Template</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-secondary: rgba(255, 255, 255, 0.035);
  --bg-input: rgba(0, 0, 0, 0.28);
  --bg-input-focus: rgba(0, 0, 0, 0.36);
  --bg-dropdown: rgba(15, 15, 18, 0.96);

  --border: rgba(255, 255, 255, 0.06);
  --border-soft: rgba(255, 255, 255, 0.04);
  --border-strong: rgba(255, 255, 255, 0.12);

  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;

  --accent: #1D9E75;
  --accent-glow: rgba(29, 158, 117, 0.35);
  --warning: #FF8A4D;
  --warning-bg: rgba(163, 45, 45, 0.10);
  --tag-stack: #D8AB30;
  --tag-stack-bg: rgba(216, 171, 48, 0.15);

  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 60%),
    radial-gradient(50% 40% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 60%);
  filter: blur(40px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: 56px 20px 80px;
  padding-top: max(56px, env(safe-area-inset-top, 56px));
}

.section-title {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '≡'; font-size: 14px; opacity: 0.5; }

.pm-card {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 22px 22px 18px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}

.pm-head { margin-bottom: 12px; }
.pm-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.pm-title {
  font-size: 24px; font-weight: 700;
  letter-spacing: -0.022em;
  color: var(--text-primary);
  line-height: 1.15; margin-bottom: 2px;
}
.pm-progress-text {
  font-family: var(--font-mono);
  font-size: 12px; color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
  margin-top: 6px;
}
.pm-progress-track {
  height: 5px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 999px; overflow: hidden;
  margin: 14px 0 18px;
}
.pm-progress-track.small { height: 3px; margin: 8px 0 0; }
.pm-progress-fill {
  height: 100%; width: 0%;
  background: #FFFFFF; border-radius: 999px;
  transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
}

.pm-group { margin-bottom: 10px; }
.pm-group-head {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 4px;
  cursor: pointer;
  user-select: none;
}
.pm-group-chevron {
  font-size: 10px; color: var(--text-tertiary);
  transition: transform 0.18s;
  display: inline-flex; width: 12px; justify-content: center;
  flex-shrink: 0;
}
.pm-group.collapsed .pm-group-chevron { transform: rotate(-90deg); }
.pm-group.collapsed .pm-group-body { display: none; }
.pm-group-count {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-tertiary);
  margin-left: auto;
}

.pm-proj {
  border-radius: 10px;
  background: var(--bg-secondary);
  margin-bottom: 6px;
  border: 1px solid transparent;
  transition: background 0.2s, border-color 0.2s;
}
.pm-proj:hover { background: rgba(255,255,255,0.05); }
.pm-proj.overdue { border-color: rgba(239, 68, 68, 0.35); }

.pm-proj-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
}
.pm-proj-chevron {
  font-size: 10px; color: var(--text-tertiary);
  transition: transform 0.18s;
  flex-shrink: 0;
  display: inline-flex; width: 12px; justify-content: center;
}
.pm-proj.expanded .pm-proj-chevron { transform: rotate(90deg); }
.pm-proj-name {
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  flex: 1; min-width: 0;
}
.pm-proj.status-done .pm-proj-name { text-decoration: line-through; color: var(--text-tertiary); }

.pm-proj-body { padding: 0 12px 12px 34px; }
.pm-proj-meta {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 6px 10px;
  font-size: 11px; color: var(--text-tertiary);
}
.pm-proj-meta .is-blank { color: var(--text-quaternary); font-style: italic; }

.pm-proj-tasks { margin-top: 12px; display: none; }
.pm-proj.expanded .pm-proj-tasks { display: block; }

.pm-check {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  background: var(--bg-card);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: transparent;
  transition: all 0.2s;
  flex-shrink: 0; font-family: inherit; padding: 0;
}
.pm-check:hover { border-color: var(--accent); }
.pm-check.checked {
  background: var(--accent); border-color: var(--accent);
  color: white;
  box-shadow: 0 0 12px var(--accent-glow);
}
.pm-check.sm { width: 22px; height: 22px; font-size: 11px; }

.pm-task {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  border-radius: 8px;
  margin-bottom: 4px;
  transition: background 0.15s;
}
.pm-task:hover { background: rgba(255,255,255,0.04); }
.pm-task.done .pm-task-name { text-decoration: line-through; color: var(--text-tertiary); }
.pm-task-name { font-size: 13px; color: var(--text-primary); flex: 1; min-width: 0; }
.pm-task-due { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); white-space: nowrap; }
.pm-task.overdue .pm-task-due { color: #FF8A8A; }

.pm-status-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px; border-radius: 99px;
  font-weight: 600; letter-spacing: 0.04em;
  text-transform: lowercase;
  border: none; cursor: pointer;
  transition: filter 0.15s;
  white-space: nowrap;
}
.pm-status-pill:hover { filter: brightness(1.15); }
.pm-status-pill.status-not_started { background: rgba(255,255,255,0.08); color: var(--text-tertiary); }
.pm-status-pill.status-planning { background: rgba(125,211,252,0.12); color: #7DD3FC; }
.pm-status-pill.status-in_progress { background: var(--tag-stack-bg); color: var(--tag-stack); }
.pm-status-pill.status-done { background: var(--accent-glow); color: var(--accent); }

.pm-priority-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px; border-radius: 99px;
  font-weight: 600; letter-spacing: 0.04em;
  text-transform: lowercase;
  border: none; cursor: pointer;
  transition: filter 0.15s;
  white-space: nowrap;
}
.pm-priority-pill:hover { filter: brightness(1.15); }
.pm-priority-pill.priority-low { background: var(--accent-glow); color: var(--accent); }
.pm-priority-pill.priority-medium { background: var(--tag-stack-bg); color: var(--tag-stack); }
.pm-priority-pill.priority-high { background: rgba(239, 68, 68, 0.15); color: #FF8A8A; }

.pm-item-del {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 16px;
  padding: 4px 10px; border-radius: 6px;
  opacity: 0.7;
  transition: opacity 0.15s, color 0.15s, border-color 0.15s, background 0.15s;
  font-family: inherit;
  line-height: 1;
  min-width: 28px; min-height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pm-item-del:hover, .pm-item-del:active {
  color: #FF6B6B;
  border-color: rgba(239, 68, 68, 0.45);
  background: rgba(239, 68, 68, 0.08);
  opacity: 1;
}
.pm-item-del.sm { min-width: 22px; min-height: 22px; font-size: 13px; padding: 2px 6px; opacity: 0.5; }
.pm-task:hover .pm-item-del.sm { opacity: 1; }

.pm-list-empty {
  font-size: 12px;
  color: var(--text-quaternary);
  font-style: italic;
  padding: 8px 12px;
}

.pm-task-add-row {
  display: flex; gap: 6px; align-items: center;
  margin-top: 8px;
}
.pm-task-add-row .pm-input { flex: 1; padding: 7px 10px; font-size: 12px; }
.pm-task-add-row input[type="date"] { flex: none; width: 130px; }
.pm-task-add-btn {
  font-size: 12px;
  padding: 7px 11px;
  border-radius: 8px;
  border: 1px solid var(--border-strong);
  background: transparent;
  color: var(--text-secondary);
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: border-color 0.15s, color 0.15s;
}
.pm-task-add-btn:hover { border-color: var(--accent); color: var(--text-primary); }

.pm-add-wrap {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border-soft);
}
.pm-add-label { margin-bottom: 10px; }
.pm-add-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}
.pm-add-row .pm-input:first-child { flex: 2; }
.pm-add-row .pm-input:last-child { flex: 1; }
.pm-add-row2 {
  display: grid;
  grid-template-columns: 1fr 1fr 110px 110px 90px;
  gap: 6px;
  align-items: center;
}
.pm-input {
  font-size: 13px;
  padding: 9px 11px;
  border-radius: 10px;
  border: 1px solid var(--border-strong);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: inherit;
  transition: border-color 0.18s, background 0.18s;
}
.pm-input::placeholder { color: var(--text-tertiary); }
.pm-input:focus {
  outline: none;
  border-color: rgba(255, 255, 255, 0.40);
  background: var(--bg-input-focus);
}
.pm-select { cursor: pointer; }
.pm-add-btn {
  font-size: 13px;
  padding: 9px 11px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.85);
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B;
  font-weight: 700;
  letter-spacing: 0.005em;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.12s, box-shadow 0.18s, background 0.18s;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.55),
    0 4px 14px rgba(0, 0, 0, 0.30);
}
.pm-add-btn:hover {
  background: linear-gradient(180deg, #FFFFFF 0%, #F2F0EA 100%);
  transform: translateY(-1px);
}
.pm-add-btn:active { transform: translateY(0) scale(0.97); }

.attribution {
  text-align: center; margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-quaternary);
}

@media (max-width: 600px) {
  main { padding: 40px 16px 60px; }
  .pm-card { padding: 18px 16px 14px; }
  .pm-proj-body { padding-left: 12px; }
  .pm-add-row2 { grid-template-columns: 1fr 1fr; }
  .pm-add-row2 .pm-add-btn { grid-column: 1 / -1; }
}

::selection { background: rgba(224, 118, 88, 0.3); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
</style>
</head>
<body>

<main>

  <div class="section-title">Project Manager</div>

  <div class="pm-card">
    <div class="pm-head">
      <div class="pm-eyebrow">Projects</div>
      <div class="pm-title">Track what's in flight</div>
      <div class="pm-progress-text" id="pmProgressText">— / — done</div>
    </div>

    <div class="pm-progress-track">
      <div id="pmProgressBar" class="pm-progress-fill"></div>
    </div>

    <div id="pmList"></div>

    <div class="pm-add-wrap">
      <div class="pm-eyebrow pm-add-label">Add a project</div>
      <div class="pm-add-row">
        <input id="pmAddName" type="text" placeholder="Project name" class="pm-input" autocomplete="off" spellcheck="false" />
        <input id="pmAddOwner" type="text" placeholder="Owner (optional)" class="pm-input" autocomplete="off" spellcheck="false" />
      </div>
      <div class="pm-add-row2">
        <input id="pmAddStart" type="date" class="pm-input" title="Start date" />
        <input id="pmAddEnd" type="date" class="pm-input" title="End date" />
        <select id="pmAddPriority" class="pm-input pm-select">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <select id="pmAddStatus" class="pm-input pm-select">
          <option value="planning" selected>Planning</option>
          <option value="in_progress">In progress</option>
          <option value="done">Done</option>
        </select>
        <button id="pmAddBtn" class="pm-add-btn">+ Add</button>
      </div>
    </div>
  </div>

  <div class="attribution">// editable template · all data stays in your browser</div>
</main>

<script>
(() => {
  'use strict';

  const storeGet = (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } };
  const storeSet = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  const STORE_KEY = 'pm:projects';
  const PROJECT_STATUS_ORDER = ['planning', 'in_progress', 'done'];
  const PROJECT_STATUS_LABEL = { planning: 'planning', in_progress: 'in progress', done: 'done' };
  const TASK_STATUS_ORDER = ['not_started', 'in_progress', 'done'];
  const TASK_STATUS_LABEL = { not_started: 'not started', in_progress: 'in progress', done: 'done' };
  const PRIORITY_ORDER = ['low', 'medium', 'high'];

  function getProjects() {
    const list = storeGet(STORE_KEY);
    if (!Array.isArray(list)) return [];
    return list.map(p => ({
      id: p.id, name: p.name || '',
      status: PROJECT_STATUS_ORDER.includes(p.status) ? p.status : 'planning',
      owner: p.owner || '',
      startDate: p.startDate || '',
      endDate: p.endDate || '',
      priority: PRIORITY_ORDER.includes(p.priority) ? p.priority : 'medium',
      tasks: Array.isArray(p.tasks) ? p.tasks : [],
      createdAt: p.createdAt || 0
    }));
  }
  function setProjects(list) { storeSet(STORE_KEY, list); }

  function todayISO() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  function fmtShort(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function completionPct(project) {
    const total = project.tasks.length;
    if (total === 0) return 0;
    const done = project.tasks.filter(t => t.status === 'done').length;
    return Math.round((done / total) * 100);
  }

  // ---- in-memory UI state (not persisted — resets to all-expanded on reload) ----
  const expandedProjects = new Set();
  const collapsedGroups = new Set();

  // ---- project actions ----
  function addProject(name, owner, startDate, endDate, priority, status) {
    const v = String(name || '').trim();
    if (!v) return;
    const items = getProjects();
    const id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    items.push({
      id, name: v,
      status: PROJECT_STATUS_ORDER.includes(status) ? status : 'planning',
      owner: String(owner || '').trim(),
      startDate: String(startDate || '').trim(),
      endDate: String(endDate || '').trim(),
      priority: PRIORITY_ORDER.includes(priority) ? priority : 'medium',
      tasks: [],
      createdAt: Date.now()
    });
    setProjects(items);
    render();
  }
  function cycleProjectStatus(id) {
    const items = getProjects();
    const p = items.find(p => p.id === id);
    if (!p) return;
    const idx = PROJECT_STATUS_ORDER.indexOf(p.status);
    p.status = PROJECT_STATUS_ORDER[(idx + 1) % PROJECT_STATUS_ORDER.length];
    setProjects(items);
    render();
  }
  function cyclePriority(id) {
    const items = getProjects();
    const p = items.find(p => p.id === id);
    if (!p) return;
    const idx = PRIORITY_ORDER.indexOf(p.priority);
    p.priority = PRIORITY_ORDER[(idx + 1) % PRIORITY_ORDER.length];
    setProjects(items);
    render();
  }
  function deleteProject(id) {
    setProjects(getProjects().filter(p => p.id !== id));
    expandedProjects.delete(id);
    render();
  }
  function toggleProjectExpand(id) {
    if (expandedProjects.has(id)) expandedProjects.delete(id); else expandedProjects.add(id);
    render();
  }
  function toggleGroupCollapse(status) {
    if (collapsedGroups.has(status)) collapsedGroups.delete(status); else collapsedGroups.add(status);
    render();
  }

  // ---- task actions ----
  function addTask(projectId, name, dueDate) {
    const v = String(name || '').trim();
    if (!v) return;
    const items = getProjects();
    const p = items.find(p => p.id === projectId);
    if (!p) return;
    const id = 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    p.tasks.push({ id, name: v, status: 'not_started', dueDate: String(dueDate || '').trim(), createdAt: Date.now() });
    setProjects(items);
    expandedProjects.add(projectId);
    render();
  }
  function toggleTaskDone(projectId, taskId) {
    const items = getProjects();
    const p = items.find(p => p.id === projectId);
    const t = p && p.tasks.find(t => t.id === taskId);
    if (!t) return;
    t.status = t.status === 'done' ? 'not_started' : 'done';
    setProjects(items);
    render();
  }
  function cycleTaskStatus(projectId, taskId) {
    const items = getProjects();
    const p = items.find(p => p.id === projectId);
    const t = p && p.tasks.find(t => t.id === taskId);
    if (!t) return;
    const idx = TASK_STATUS_ORDER.indexOf(t.status);
    t.status = TASK_STATUS_ORDER[(idx + 1) % TASK_STATUS_ORDER.length];
    setProjects(items);
    render();
  }
  function deleteTask(projectId, taskId) {
    const items = getProjects();
    const p = items.find(p => p.id === projectId);
    if (!p) return;
    p.tasks = p.tasks.filter(t => t.id !== taskId);
    setProjects(items);
    render();
  }

  // ---- rendering ----
  function renderTask(projectId, t, today) {
    const isDone = t.status === 'done';
    const isOverdue = !isDone && t.dueDate && t.dueDate < today;
    const dueLabel = t.dueDate ? fmtShort(t.dueDate) : '';
    return `
      <div class="pm-task${isDone ? ' done' : ''}${isOverdue ? ' overdue' : ''}">
        <button class="pm-check sm ${isDone ? 'checked' : ''}" data-action="toggle-task" data-pid="${projectId}" data-tid="${t.id}" aria-label="Mark task complete">${isDone ? '✓' : ''}</button>
        <div class="pm-task-name">${escapeHtml(t.name)}</div>
        ${dueLabel ? `<div class="pm-task-due${isOverdue ? ' overdue' : ''}">${dueLabel}</div>` : ''}
        <button class="pm-status-pill status-${t.status}" data-action="cycle-task-status" data-pid="${projectId}" data-tid="${t.id}">${TASK_STATUS_LABEL[t.status]}</button>
        <button class="pm-item-del sm" data-action="del-task" data-pid="${projectId}" data-tid="${t.id}" aria-label="Delete task">×</button>
      </div>`;
  }

  function renderProject(p, today) {
    const isExpanded = expandedProjects.has(p.id);
    const isDone = p.status === 'done';
    const isOverdue = !isDone && p.endDate && p.endDate < today;
    const pct = completionPct(p);
    const doneCount = p.tasks.filter(t => t.status === 'done').length;

    let dateLabel = '';
    if (p.startDate && p.endDate) dateLabel = fmtShort(p.startDate) + ' → ' + fmtShort(p.endDate);
    else if (p.startDate) dateLabel = 'From ' + fmtShort(p.startDate);
    else if (p.endDate) dateLabel = 'Due ' + fmtShort(p.endDate);

    const tasksHtml = p.tasks.length
      ? p.tasks.map(t => renderTask(p.id, t, today)).join('')
      : `<div class="pm-list-empty">No tasks yet — add one below.</div>`;

    return `
      <div class="pm-proj${isExpanded ? ' expanded' : ''} status-${p.status}${isOverdue ? ' overdue' : ''}" data-id="${p.id}">
        <div class="pm-proj-head" data-action="expand-project" data-id="${p.id}">
          <span class="pm-proj-chevron">▶</span>
          <div class="pm-proj-name">${escapeHtml(p.name)}</div>
          <button class="pm-priority-pill priority-${p.priority}" data-action="cycle-priority" data-id="${p.id}">${p.priority}</button>
          <button class="pm-item-del" data-action="del-project" data-id="${p.id}" aria-label="Delete project">×</button>
        </div>
        <div class="pm-proj-body">
          <div class="pm-proj-meta">
            <button class="pm-status-pill status-${p.status}" data-action="cycle-project-status" data-id="${p.id}">${PROJECT_STATUS_LABEL[p.status]}</button>
            ${p.owner ? `<span>${escapeHtml(p.owner)}</span>` : ''}
            <span${dateLabel ? '' : ' class="is-blank"'}>${dateLabel || 'No dates set'}</span>
            <span>${pct}% · ${doneCount}/${p.tasks.length} tasks</span>
          </div>
          <div class="pm-progress-track small"><div class="pm-progress-fill" style="width:${pct}%"></div></div>
          <div class="pm-proj-tasks">
            ${tasksHtml}
            <div class="pm-task-add-row">
              <input type="text" class="pm-input pm-task-add-name" placeholder="Task name" autocomplete="off" spellcheck="false" />
              <input type="date" class="pm-input pm-task-add-due" />
              <button class="pm-task-add-btn" data-action="add-task" data-id="${p.id}">+ Add task</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  function render() {
    const projects = getProjects();
    const total = projects.length;
    const done = projects.filter(p => p.status === 'done').length;
    document.getElementById('pmProgressText').textContent = `${done} / ${total} projects done`;
    const pct = total === 0 ? 0 : (done / total) * 100;
    document.getElementById('pmProgressBar').style.width = pct + '%';

    const listEl = document.getElementById('pmList');

    if (total === 0) {
      listEl.innerHTML = `<div class="pm-list-empty">No projects yet — add one below to get started.</div>`;
      return;
    }

    const today = todayISO();
    listEl.innerHTML = PROJECT_STATUS_ORDER.map(status => {
      const groupItems = projects.filter(p => p.status === status).sort((a, b) => a.createdAt - b.createdAt);
      const isCollapsed = collapsedGroups.has(status);
      return `
        <div class="pm-group${isCollapsed ? ' collapsed' : ''}" data-status="${status}">
          <div class="pm-group-head" data-action="toggle-group" data-status="${status}">
            <span class="pm-group-chevron">▼</span>
            <span class="pm-status-pill status-${status}">${PROJECT_STATUS_LABEL[status]}</span>
            <span class="pm-group-count">${groupItems.length}</span>
          </div>
          <div class="pm-group-body">${groupItems.map(p => renderProject(p, today)).join('')}</div>
        </div>`;
    }).join('');
  }

  document.getElementById('pmList').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action === 'toggle-group') toggleGroupCollapse(btn.dataset.status);
    else if (action === 'expand-project') toggleProjectExpand(btn.dataset.id);
    else if (action === 'cycle-project-status') cycleProjectStatus(btn.dataset.id);
    else if (action === 'cycle-priority') cyclePriority(btn.dataset.id);
    else if (action === 'del-project') deleteProject(btn.dataset.id);
    else if (action === 'toggle-task') toggleTaskDone(btn.dataset.pid, btn.dataset.tid);
    else if (action === 'cycle-task-status') cycleTaskStatus(btn.dataset.pid, btn.dataset.tid);
    else if (action === 'del-task') deleteTask(btn.dataset.pid, btn.dataset.tid);
    else if (action === 'add-task') {
      const row = btn.closest('.pm-task-add-row');
      addTask(btn.dataset.id, row.querySelector('.pm-task-add-name').value, row.querySelector('.pm-task-add-due').value);
    }
  });

  document.getElementById('pmList').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const row = e.target.closest('.pm-task-add-row');
    if (!row) return;
    e.preventDefault();
    row.querySelector('.pm-task-add-btn').click();
  });

  const nameInput = document.getElementById('pmAddName');
  const ownerInput = document.getElementById('pmAddOwner');
  const startInput = document.getElementById('pmAddStart');
  const endInput = document.getElementById('pmAddEnd');
  const prioritySelect = document.getElementById('pmAddPriority');
  const statusSelect = document.getElementById('pmAddStatus');
  const addBtn = document.getElementById('pmAddBtn');

  addBtn.addEventListener('click', () => {
    addProject(nameInput.value, ownerInput.value, startInput.value, endInput.value, prioritySelect.value, statusSelect.value);
    nameInput.value = '';
    ownerInput.value = '';
    startInput.value = '';
    endInput.value = '';
    prioritySelect.value = 'medium';
    statusSelect.value = 'planning';
    nameInput.focus();
  });

  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addBtn.click(); });

  render();
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'health',
    syncedKeys: ['pm:projects'],
    syncedPrefixes: [],
    onApplied: function () {
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>

</body>
</html>
